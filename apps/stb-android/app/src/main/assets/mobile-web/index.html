<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家庭 KTV 控制页</title>
  <style>
    :root{--bg:#f5f1e8;--card:#fff;--text:#1f1c17;--muted:#756d63;--line:#e3dbcf;--brand:#0d7c67;--brand-soft:#d6efe9;--danger:#c7685b;--ok:#ddf1ea;--ok-text:#156454;--warn:#f6ead1;--warn-text:#8a6408;--err:#f8dddd;--err-text:#8c2f25;--idle:#ece9e3;--idle-text:#5a534b}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif}
    .wrap{max-width:900px;margin:0 auto;padding:18px 16px 28px}.card{background:var(--card);border-radius:22px;padding:18px;margin-bottom:16px;box-shadow:0 12px 32px rgba(18,17,13,.08)}
    .hero h1,.section-title{margin:0 0 10px}.hero p,.muted,.meta{color:var(--muted)}.section-title{font-size:24px}
    .summary,.grid{display:grid;gap:12px}.summary{grid-template-columns:repeat(3,minmax(0,1fr));margin-top:12px}.grid{grid-template-columns:1fr 1fr}
    .cell{background:#faf7f2;border:1px solid var(--line);border-radius:16px;padding:14px}.value{display:block;font-size:22px;font-weight:800;margin-top:6px}
    label{display:block;margin:12px 0 6px;font-size:14px;color:var(--muted)}input[type=text],input[type=search]{width:100%;padding:14px 15px;border-radius:14px;border:1px solid var(--line);font-size:16px}input[type=range]{width:100%;margin-top:8px}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}button{border:none;border-radius:14px;padding:10px 16px;font-size:15px;font-weight:700;background:var(--brand);color:#fff;cursor:pointer}button.secondary{background:var(--brand-soft);color:#0a6454}button.danger{background:var(--danger)}button:disabled{opacity:.45;cursor:not-allowed}
    .badge{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-right:8px}.ok{background:var(--ok);color:var(--ok-text)}.warn{background:var(--warn);color:var(--warn-text)}.err{background:var(--err);color:var(--err-text)}.idle{background:var(--idle);color:var(--idle-text)}
    ul{list-style:none;margin:0;padding:0}li{border-top:1px solid var(--line);padding:14px 0}li:first-child{border-top:none;padding-top:0}
    .title{font-size:18px;font-weight:800;line-height:1.45}.meta{margin-top:8px;font-size:14px;line-height:1.55}.item-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .progress{height:8px;background:#ede6da;border-radius:999px;overflow:hidden;margin-top:10px}.progress>div{height:100%;background:var(--brand);width:0}
    .box{border-radius:16px;background:#f8f4ed;padding:14px}.mono{white-space:pre-wrap;word-break:break-all;background:#f7f4ee;color:#5f574e;border-radius:14px;padding:14px;font-size:12px;line-height:1.55}
    .empty{color:var(--muted);padding:8px 0}.search-card{display:grid;grid-template-columns:110px 1fr;gap:14px}.thumb{width:110px;height:146px;border-radius:14px;background:#ece6da;object-fit:cover}.pager{display:flex;justify-content:space-between;align-items:center;gap:12px;padding-top:12px}.pager-info{color:var(--muted);font-size:14px}
    .mix-group{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)} .mix-row{display:flex;align-items:center;gap:12px;margin-top:8px}.mix-row label{margin:0;width:42px}.mix-row input{flex:1}.mix-value{min-width:36px;text-align:right;font-weight:700}
    @media (max-width:720px){.summary,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card hero">
      <h1>家庭 KTV 控制页</h1>
      <p>多人扫码进入同一会话，共享公共队列、下载状态和播放状态。</p>
      <div class="summary">
        <div class="cell"><div class="muted">连接状态</div><span id="socketStatus" class="value">未连接</span></div>
        <div class="cell"><div class="muted">在线手机数</div><span id="clientCount" class="value">0</span></div>
        <div class="cell"><div class="muted">当前播放</div><span id="heroNowPlaying" class="value" style="font-size:18px">暂无播放</span></div>
      </div>
      <label for="sessionId">Session ID</label><input id="sessionId" type="text">
      <label for="clientName">客户端名称</label><input id="clientName" type="text" placeholder="Phone-777">
      <label for="keyword">搜索</label><input id="keyword" type="search" placeholder="输入歌名或歌手">
      <div class="actions">
        <button id="refreshBtn" type="button" class="secondary">刷新</button>
        <button id="bindBtn" type="button">绑定</button>
        <button id="searchBtn" type="button">搜索</button>
        <button id="clearSearchBtn" type="button" class="secondary">清空搜索</button>
      </div>
      <div class="actions">
        <button id="nextBtn" type="button" class="secondary">下一首</button>
        <button id="pauseBtn" type="button" class="secondary">暂停</button>
        <button id="resumeBtn" type="button" class="secondary">继续</button>
      </div>
      <label for="volumeRange">总音量</label><input id="volumeRange" type="range" min="0" max="100" value="100">
      <div id="mixControls" class="mix-group" style="display:none">
        <div class="muted">人声和伴奏可独立调节</div>
        <div class="mix-row"><label for="vocalRange">人声</label><input id="vocalRange" type="range" min="0" max="100" value="100"><span id="vocalValue" class="mix-value">100</span></div>
        <div class="mix-row"><label for="accRange">伴奏</label><input id="accRange" type="range" min="0" max="100" value="100"><span id="accValue" class="mix-value">100</span></div>
      </div>
      <p id="statusText" class="muted" style="margin-top:10px"></p>
    </section>

    <div class="grid">
      <section class="card"><h2 class="section-title">当前播放</h2><div id="playerView"></div></section>
      <section class="card">
        <h2 class="section-title">最近下载状态</h2><div id="downloadView" class="box"></div>
        <h3 style="margin:16px 0 10px">文件状态</h3><pre id="fileStatus" class="mono">尚未查询文件状态</pre>
      </section>
    </div>

    <section class="card"><h2 class="section-title">搜索结果</h2><ul id="results"></ul><div id="searchPager" class="pager"></div></section>
    <section class="card"><h2 class="section-title">公共队列</h2><ul id="queue"></ul></section>
    <section class="card"><h2 class="section-title">本地资源</h2><ul id="localList"></ul></section>
    <section class="card"><h2 class="section-title">会话调试信息</h2><pre id="output" class="mono"></pre></section>
  </div>

  <script>
    const storageKeys={sessionId:"ktv_session_id",clientId:"ktv_client_id",clientName:"ktv_client_name"};
    const el={
      sessionId:document.getElementById("sessionId"),clientName:document.getElementById("clientName"),keyword:document.getElementById("keyword"),
      socketStatus:document.getElementById("socketStatus"),clientCount:document.getElementById("clientCount"),heroNowPlaying:document.getElementById("heroNowPlaying"),
      statusText:document.getElementById("statusText"),output:document.getElementById("output"),results:document.getElementById("results"),
      searchPager:document.getElementById("searchPager"),queue:document.getElementById("queue"),localList:document.getElementById("localList"),
      playerView:document.getElementById("playerView"),downloadView:document.getElementById("downloadView"),fileStatus:document.getElementById("fileStatus"),
      volumeRange:document.getElementById("volumeRange"),vocalRange:document.getElementById("vocalRange"),accRange:document.getElementById("accRange"),
      vocalValue:document.getElementById("vocalValue"),accValue:document.getElementById("accValue"),mixControls:document.getElementById("mixControls"),
      refreshBtn:document.getElementById("refreshBtn"),bindBtn:document.getElementById("bindBtn"),searchBtn:document.getElementById("searchBtn"),
      clearSearchBtn:document.getElementById("clearSearchBtn"),nextBtn:document.getElementById("nextBtn"),pauseBtn:document.getElementById("pauseBtn"),
      resumeBtn:document.getElementById("resumeBtn")
    };
    const state={session:null,searchResults:[],searchPage:1,pageSize:5,queue:[],localList:[],player:null,lastDownload:null,socket:null,heartbeat:null,reconnect:null};
    const clientId=getOrCreateClientId();
    const query=new URLSearchParams(location.search);

    init();

    function init(){
      el.sessionId.value=query.get("session_id")||localStorage.getItem(storageKeys.sessionId)||"";
      el.clientName.value=localStorage.getItem(storageKeys.clientName)||`Phone-${clientId.slice(-4)}`;
      bindEvents();
      refreshAll().then(()=>{ if(query.get("session_id")) bindSession(); });
      document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") ensureSocket(); });
    }

    function bindEvents(){
      el.refreshBtn.onclick=refreshAll; el.bindBtn.onclick=bindSession; el.searchBtn.onclick=searchSongs; el.clearSearchBtn.onclick=clearSearch;
      el.nextBtn.onclick=playNext; el.pauseBtn.onclick=pausePlayer; el.resumeBtn.onclick=resumePlayer;
      el.volumeRange.onchange=setVolume; el.vocalRange.onchange=setVocalVolume; el.accRange.onchange=setAccompanimentVolume;
      el.keyword.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); searchSongs(); } });
      el.clientName.addEventListener("change",()=>localStorage.setItem(storageKeys.clientName,el.clientName.value.trim()));
      el.sessionId.addEventListener("change",()=>localStorage.setItem(storageKeys.sessionId,el.sessionId.value.trim()));
    }

    async function refreshAll(){ await Promise.all([refreshSession(),refreshPlayer(),refreshQueue(),refreshLocal()]); ensureSocket(); }
    async function refreshSession(){ const r=await getJson("/api/session/status"); state.session=r; const s=r?.data; if(s?.session_id){ el.sessionId.value=s.session_id; localStorage.setItem(storageKeys.sessionId,s.session_id); } renderStatus(); }
    async function bindSession(){ const sid=el.sessionId.value.trim(); if(!sid){ setStatus("缺少 Session ID"); return; } localStorage.setItem(storageKeys.sessionId,sid); localStorage.setItem(storageKeys.clientName,el.clientName.value.trim()); const r=await postJson("/api/session/bind",{session_id:sid,client_id:clientId,client_name:el.clientName.value.trim(),sign:""}); if(r?.code&&r.code!==0){ setStatus(r.message||"绑定失败"); return; } state.session={data:{...(state.session?.data||{}),...(r.data||{})}}; renderStatus(); ensureSocket(true); }
    async function searchSongs(){ const keyword=el.keyword.value.trim(); if(!keyword){ setStatus("请先输入关键词"); return; } setStatus(`正在搜索：${keyword}`); const r=await getJson(`/api/search/bilibili?keyword=${encodeURIComponent(keyword)}`); if(r?.code&&r.code!==0){ state.searchResults=[]; renderSearchResults(); setStatus(r.message||"搜索失败"); return; } state.searchResults=Array.isArray(r?.data?.list)?r.data.list:Array.isArray(r?.data?.items)?r.data.items:[]; state.searchPage=1; renderSearchResults(); setStatus(state.searchResults.length?`已找到 ${state.searchResults.length} 条结果`:"没有找到结果"); }
    function clearSearch(){ state.searchResults=[]; state.searchPage=1; renderSearchResults(); setStatus("已清空搜索结果"); }
    async function downloadSong(item){ const r=await postJson("/api/search/download",{client_id:clientId,client_name:el.clientName.value.trim()||null,source_type:item.source_type||"bilibili",source_id:item.source_id,title:item.title,title_b64:encodeBase64Utf8(item.title||""),artist:item.artist||null,artist_b64:item.artist?encodeBase64Utf8(item.artist):null,duration:item.duration||0,cover_url:item.cover_url||null}); if(r?.code&&r.code!==0){ setStatus(r.message||"加入本地下载失败"); return; } setStatus(`已加入本地下载：${normalizeTitle(item.title)}`); await refreshLocal(); }
    async function refreshQueue(){ const r=await getJson("/api/queue/list"); state.queue=Array.isArray(r?.data?.items)?r.data.items:[]; renderQueue(); }
    async function moveNext(id){ const r=await postJson("/api/queue/move-next",{queue_id:id}); setStatus(r?.data?.success?"已置顶为下一首":"置顶失败"); await refreshQueue(); }
    async function removeItem(id){ const r=await postJson("/api/queue/remove",{queue_id:id}); setStatus(r?.data?.success?"已从队列移除":"移除失败"); await refreshQueue(); }
    async function refreshPlayer(){ state.player=await getJson("/api/player/status"); renderPlayer(); }
    async function playNext(){ await postJson("/api/player/next",{}); await refreshPlayer(); await refreshQueue(); }
    async function pausePlayer(){ await postJson("/api/player/pause",{}); await refreshPlayer(); }
    async function resumePlayer(){ await postJson("/api/player/resume",{}); await refreshPlayer(); }
    async function setVolume(){ await postJson("/api/player/volume",{value:Number(el.volumeRange.value||100)}); await refreshPlayer(); }
    async function setVocalVolume(){ await postJson("/api/player/vocal-volume",{value:Number(el.vocalRange.value||100)}); await refreshPlayer(); }
    async function setAccompanimentVolume(){ await postJson("/api/player/accompaniment-volume",{value:Number(el.accRange.value||100)}); await refreshPlayer(); }
    async function refreshLocal(){ const r=await getJson("/api/local/list"); state.localList=Array.isArray(r?.data?.list)?r.data.list:[]; renderLocal(); }
    async function localOrder(songId){ const r=await postJson("/api/local/order",{song_id:songId,client_id:clientId,client_name:el.clientName.value.trim()||null}); setStatus(r?.data?.success?"已加入公共队列":"本地点歌失败"); await refreshQueue(); await refreshPlayer(); }
    async function localSeparate(songId){ const r=await postJson("/api/local/separate",{song_id:songId}); setStatus(r?.data?.success?"已开始伴奏分离":"伴奏分离启动失败"); await refreshLocal(); }
    async function localDelete(songId){ const r=await postJson("/api/local/delete",{song_id:songId}); setStatus(r?.data?.success?"已删除本地缓存":"删除缓存失败"); await refreshLocal(); await refreshQueue(); }
    async function showFileStatus(songId){ const r=await getJson(`/api/local/file-status?song_id=${encodeURIComponent(songId)}`); el.fileStatus.textContent=JSON.stringify(r?.data||{},null,2); }

    function ensureSocket(force=false){
      const sid=el.sessionId.value.trim(); if(!sid) return;
      if(force&&state.socket){ state.socket.close(); state.socket=null; }
      if(state.socket&&[WebSocket.OPEN,WebSocket.CONNECTING].includes(state.socket.readyState)){ renderStatus(); return; }
      const params=new URLSearchParams({session_id:sid,client_id:clientId,client_name:el.clientName.value.trim()||""});
      const protocol=location.protocol==="https:"?"wss:":"ws:";
      const ws=new WebSocket(`${protocol}//${location.host}/ws?${params.toString()}`);
      state.socket=ws;
      ws.onopen=()=>{ stopHeartbeat(); startHeartbeat(); renderStatus(); setStatus("WebSocket 已连接"); };
      ws.onclose=()=>{ stopHeartbeat(); renderStatus(); setStatus("WebSocket 已断开，正在重连"); clearTimeout(state.reconnect); state.reconnect=setTimeout(()=>ensureSocket(false),1500); };
      ws.onerror=()=>renderStatus();
      ws.onmessage=e=>{ try{ const p=JSON.parse(e.data); onSocket(p.event,p.data); }catch(err){ console.error(err); } };
    }
    function startHeartbeat(){ stopHeartbeat(); state.heartbeat=setInterval(()=>{ if(state.socket?.readyState===WebSocket.OPEN){ try{ state.socket.send(JSON.stringify({type:"ping",at:Date.now()})); }catch(_){} } },12000); }
    function stopHeartbeat(){ if(state.heartbeat){ clearInterval(state.heartbeat); state.heartbeat=null; } }
    function onSocket(event,data){
      if(event==="queue_updated"){ state.queue=Array.isArray(data?.items)?data.items:state.queue; if(typeof data?.client_count==="number"&&state.session?.data) state.session.data.client_count=data.client_count; renderQueue(); renderStatus(); return; }
      if(event==="player_updated"){ state.player={data}; renderPlayer(); return; }
      if(event==="download_updated"){ state.lastDownload=data; renderDownload(); refreshLocal(); refreshQueue(); return; }
      if(event==="separate_updated"){ refreshLocal(); refreshQueue(); if(data?.title){ setStatus(`分离状态更新：${normalizeTitle(data.title)} / ${data.separate_status||"-"}`); } }
    }

    function renderStatus(){
      const s=state.session?.data||null; const clientCount=s?.client_count||s?.clientCount||0;
      el.output.textContent=JSON.stringify(state.session||{},null,2);
      el.socketStatus.textContent=state.socket&&state.socket.readyState===WebSocket.OPEN?"已连接":"未连接";
      el.clientCount.textContent=String(clientCount);
      el.statusText.textContent=`客户端 ${clientId} / 在线手机 ${clientCount}`;
    }

    function renderPlayer(){
      const p=state.player?.data||null;
      const title=normalizeTitle(p?.title||"暂无播放");
      el.heroNowPlaying.textContent=title;
      if(!p){
        el.mixControls.style.display="none";
        el.playerView.innerHTML='<div class="empty">暂无播放器状态</div>';
        return;
      }
      el.volumeRange.value=String(p.volume??100);
      el.mixControls.style.display=p.mix_available?"block":"none";
      el.vocalRange.value=String(p.vocal_volume??100);
      el.accRange.value=String(p.accompaniment_volume??100);
      el.vocalValue.textContent=String(p.vocal_volume??100);
      el.accValue.textContent=String(p.accompaniment_volume??100);
      el.playerView.innerHTML=`<div class="title">${escapeHtml(title)}</div><div class="meta">${badgeHtml(p.play_status||"idle")}<span>${formatTime(p.current_time_ms)} / ${formatTime(p.duration_ms)}</span><span style="margin-left:8px;">总音量 ${p.volume??100}</span>${p.mix_available?`<span style="margin-left:8px;">人声 ${p.vocal_volume??100} / 伴奏 ${p.accompaniment_volume??100}</span>`:""}</div>${p.error_message?`<div class="meta">错误：${escapeHtml(p.error_message)}</div>`:""}`;
    }

    function renderSearchResults(){
      el.results.innerHTML=""; el.searchPager.innerHTML="";
      if(!state.searchResults.length){ el.results.innerHTML='<li class="empty">没有找到结果</li>'; return; }
      const total=state.searchResults.length,pageCount=Math.max(1,Math.ceil(total/state.pageSize));
      state.searchPage=Math.min(Math.max(1,state.searchPage),pageCount);
      const start=(state.searchPage-1)*state.pageSize;
      const items=state.searchResults.slice(start,start+state.pageSize);
      items.forEach(item=>{
        const li=document.createElement("li");
        li.innerHTML=`<div class="search-card"><img class="thumb" src="${escapeAttr(resolveCoverUrl(item.cover_url||""))}" alt="" onerror="this.style.visibility='hidden';this.parentElement.style.background='#ece6da';"><div><div class="title">${escapeHtml(normalizeTitle(item.title))}</div><div class="meta">${escapeHtml(item.artist||"Unknown")} / ${formatDurationSeconds(item.duration)}</div><div class="item-actions"></div></div></div>`;
        const btn=document.createElement("button");
        btn.type="button";
        btn.textContent="下载并分离";
        btn.onclick=()=>downloadSong(item);
        li.querySelector(".item-actions").appendChild(btn);
        el.results.appendChild(li);
      });
      renderSearchPager(pageCount,total);
    }

    function renderSearchPager(pageCount,total){
      const info=document.createElement("div");
      info.className="pager-info";
      info.textContent=`第 ${state.searchPage} / ${pageCount} 页，共 ${total} 条`;
      const actions=document.createElement("div");
      actions.className="item-actions";
      const prev=document.createElement("button");
      prev.type="button"; prev.className="secondary"; prev.textContent="上一页"; prev.disabled=state.searchPage<=1; prev.onclick=()=>{ state.searchPage-=1; renderSearchResults(); };
      actions.appendChild(prev);
      const next=document.createElement("button");
      next.type="button"; next.className="secondary"; next.textContent="下一页"; next.disabled=state.searchPage>=pageCount; next.onclick=()=>{ state.searchPage+=1; renderSearchResults(); };
      actions.appendChild(next);
      el.searchPager.appendChild(info);
      el.searchPager.appendChild(actions);
    }

    function renderQueue(){
      el.queue.innerHTML="";
      const items=state.queue.filter(it=>["waiting","playing"].includes(it.queue_status));
      if(!items.length){ el.queue.innerHTML='<li class="empty">当前公共队列为空</li>'; return; }
      items.forEach(it=>{
        const progress=it.download_progress??(it.download_status==="success"?100:0);
        const li=document.createElement("li");
        li.innerHTML=`<div class="title">#${it.position} ${escapeHtml(normalizeTitle(it.title))}</div><div class="meta">点歌人：${escapeHtml(it.ordered_by_client_name||it.ordered_by_client_id||"-")}</div><div class="meta">${badgeHtml(it.queue_status)} ${badgeHtml(it.download_status)}</div>${it.skip_reason||it.error_message?`<div class="meta">提示：${escapeHtml(it.skip_reason||it.error_message)}</div>`:""}<div class="progress"><div style="width:${Math.max(0,Math.min(progress,100))}%"></div></div><div class="meta">下载进度 ${progress}%</div><div class="item-actions"></div>`;
        const actions=li.querySelector(".item-actions");
        const nextBtn=document.createElement("button");
        nextBtn.type="button"; nextBtn.className="secondary"; nextBtn.textContent="置顶下一首"; nextBtn.disabled=it.queue_status!=="waiting"; nextBtn.onclick=()=>moveNext(it.queue_id); actions.appendChild(nextBtn);
        const removeBtn=document.createElement("button");
        removeBtn.type="button"; removeBtn.className="danger"; removeBtn.textContent="移除"; removeBtn.disabled=it.queue_status==="playing"; removeBtn.onclick=()=>removeItem(it.queue_id); actions.appendChild(removeBtn);
        const fileBtn=document.createElement("button");
        fileBtn.type="button"; fileBtn.className="secondary"; fileBtn.textContent="file-status"; fileBtn.onclick=()=>showFileStatus(it.song_id); actions.appendChild(fileBtn);
        el.queue.appendChild(li);
      });
    }

    function renderLocal(){
      el.localList.innerHTML="";
      if(!state.localList.length){ el.localList.innerHTML='<li class="empty">暂无本地资源</li>'; return; }
      state.localList.forEach(it=>{
        const li=document.createElement("li");
        li.innerHTML=`<div class="title">${escapeHtml(normalizeTitle(it.title||"未命名歌曲"))}</div><div class="meta">${badgeHtml(it.download_status)} ${badgeHtml(it.separate_status||"pending")} ${badgeHtml(it.is_valid?"valid":"invalid")}</div><div class="meta">文件大小 ${formatBytes(it.file_size)} / 视频轨 ${it.video_track_exists?"有":"无"} / 音频轨 ${it.audio_track_exists?"有":"无"}</div><div class="meta">时长 ${formatTime(it.duration_ms)}${it.width&&it.height?` / ${it.width}x${it.height}`:""}</div>${it.accompaniment_path||it.vocal_path?`<div class="meta">分离结果 ${it.accompaniment_path?"伴奏已生成":"伴奏未生成"} / ${it.vocal_path?"人声已生成":"人声未生成"}</div>`:""}${it.error_code||it.error_message?`<div class="meta">错误 ${escapeHtml(it.error_code||"")}${it.error_message?` / ${escapeHtml(it.error_message)}`:""}</div>`:""}<div class="item-actions"></div>`;
        const actions=li.querySelector(".item-actions");
        const orderBtn=document.createElement("button");
        orderBtn.type="button"; orderBtn.textContent="本地点歌"; orderBtn.disabled=!it.is_valid||it.download_status!=="success"; orderBtn.onclick=()=>localOrder(it.song_id); actions.appendChild(orderBtn);
        const separateBtn=document.createElement("button");
        separateBtn.type="button"; separateBtn.className="secondary"; separateBtn.textContent="伴奏分离"; separateBtn.disabled=it.download_status!=="success"||it.separate_status==="processing"; separateBtn.onclick=()=>localSeparate(it.song_id); actions.appendChild(separateBtn);
        const deleteBtn=document.createElement("button");
        deleteBtn.type="button"; deleteBtn.className="danger"; deleteBtn.textContent="删除缓存"; deleteBtn.onclick=()=>localDelete(it.song_id); actions.appendChild(deleteBtn);
        const fileBtn=document.createElement("button");
        fileBtn.type="button"; fileBtn.className="secondary"; fileBtn.textContent="file-status"; fileBtn.onclick=()=>showFileStatus(it.song_id); actions.appendChild(fileBtn);
        el.localList.appendChild(li);
      });
    }

    function renderDownload(){
      const it=state.lastDownload;
      if(!it){ el.downloadView.innerHTML='<div class="empty">暂无最近下载记录</div>'; return; }
      const progress=Math.max(0,Math.min(Number(it.progress||0),100));
      el.downloadView.innerHTML=`<div class="title">${escapeHtml(normalizeTitle(it.title||"未命名歌曲"))}</div><div class="meta">${badgeHtml(it.download_status||"idle")}${it.error_code?` <span>${escapeHtml(it.error_code)}</span>`:""}</div><div class="progress"><div style="width:${progress}%"></div></div><div class="meta">进度 ${progress}%</div>${it.file_path?`<div class="meta">文件：${escapeHtml(it.file_path)}</div>`:""}${it.error_message?`<div class="meta">错误：${escapeHtml(it.error_message)}</div>`:""}`;
    }

    function badgeHtml(status){ const t=String(status||"idle"); return `<span class="badge ${badgeClass(t)}">${escapeHtml(t)}</span>`; }
    function badgeClass(status){ const v=String(status||"").toLowerCase(); if(["success","playing","valid","bound"].includes(v)) return "ok"; if(["failed","error","removed","invalid"].includes(v)) return "err"; if(["downloading","buffering","skipped","pending","paused","processing"].includes(v)) return "warn"; return "idle"; }
    function normalizeTitle(value){ const text=decodeHtml(String(value||"")).replace(/\s+/g," ").trim(); return text||"未命名歌曲"; }
    function decodeHtml(value){ const node=document.createElement("textarea"); node.innerHTML=value; return node.value; }
    function encodeBase64Utf8(value){ const bytes=new TextEncoder().encode(String(value??"")); let binary=""; bytes.forEach(b=>binary+=String.fromCharCode(b)); return btoa(binary); }
    function escapeHtml(value){ return String(value??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
    function escapeAttr(value){ return String(value??"").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function resolveCoverUrl(url){ const raw=String(url||"").trim(); return raw?`/api/image/fetch?url=${encodeURIComponent(raw)}`:""; }
    function formatTime(ms){ const safe=Math.max(0,Number(ms||0)); const s=Math.floor(safe/1000); const m=Math.floor(s/60); return `${String(m).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }
    function formatDurationSeconds(seconds){ return formatTime(Number(seconds||0)*1000); }
    function formatBytes(bytes){ const value=Number(bytes||0); if(value<=0)return"0 B"; if(value<1024)return`${value} B`; if(value<1024*1024)return`${(value/1024).toFixed(1)} KB`; if(value<1024*1024*1024)return`${(value/1024/1024).toFixed(1)} MB`; return`${(value/1024/1024/1024).toFixed(1)} GB`; }
    function setStatus(text){ el.statusText.textContent=text; }
    async function getJson(url){ const r=await fetch(url,{headers:{Accept:"application/json"}}); return r.json(); }
    async function postJson(url,body){ const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json",Accept:"application/json"},body:JSON.stringify(body)}); return r.json(); }
    function getOrCreateClientId(){ const existing=localStorage.getItem(storageKeys.clientId); if(existing) return existing; const created=typeof crypto!=="undefined"&&typeof crypto.randomUUID==="function"?`web-${crypto.randomUUID()}`:`web-${Date.now()}-${Math.random().toString(16).slice(2)}`; localStorage.setItem(storageKeys.clientId,created); return created; }
  </script>
</body>
</html>
